quarkus.datasource.db-kind=postgresql

# Flyway is the source of truth for runtime schema management.
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# Lets existing non-empty hand-managed databases adopt Flyway history.
# Remove this after every environment has a Flyway schema history table.
quarkus.flyway.baseline-on-migrate=true
