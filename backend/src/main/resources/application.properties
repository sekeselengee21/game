quarkus.datasource.db-kind=postgresql

# Flyway is the source of truth for runtime schema management.
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# REMOVED: Never allow Flyway to silently skip baseline DDL in production.
# In a containerized deployment the schema must be 100% managed by versioned
# migrations. baseline-on-migrate stamps V1 as "already applied" against a
# non-empty volume and boots with missing tables. With it gone, an unexpected
# schema state fails startup loudly with a clear Flyway error instead.
# quarkus.flyway.baseline-on-migrate=true
