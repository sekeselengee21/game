services:
  db:
    image: postgres:15-alpine
    container_name: poker_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-poker_prod_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-prod_secure_pass}
      POSTGRES_DB: ${DB_NAME:-poker_db}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-poker_prod_user} -d ${DB_NAME:-poker_db}"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - prod_network

  redis:
    image: redis:7-alpine
    container_name: poker_redis_prod
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redisdata_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - prod_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: poker_backend_prod
    restart: always
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/${DB_NAME:-poker_db}
      QUARKUS_DATASOURCE_USERNAME: ${DB_USER:-poker_prod_user}
      QUARKUS_DATASOURCE_PASSWORD: ${DB_PASSWORD:-prod_secure_pass}
      QUARKUS_REDIS_HOSTS: redis://redis:6379
      # Email auto-promoted to ADMIN on startup / at registration (optional;
      # blank = disabled). Set BOOTSTRAP_ADMIN_EMAIL in .env to enable.
      APP_BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      # To override CORS origins, uncomment and set a NON-empty value — an empty
      # value would wipe the built-in allowlist. Defaults live in CorsFilter.java.
      # APP_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prod_network

  frontend:
    build:
      context: ./p-frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8080}
    container_name: poker_frontend_prod
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - prod_network

networks:
  prod_network:
    driver: bridge

volumes:
  pgdata_prod:
  redisdata_prod:
