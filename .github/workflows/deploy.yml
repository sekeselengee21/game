name: CI & Deploy

# On every push/PR to main: build + test backend, verify Flyway migrations are
# actually packaged in the jar, build + lint the frontend. Only on push to main,
# and only if the backend build passes, redeploy the production stack on the VM.
#
# Deploy requires three repository secrets (Settings > Secrets and variables >
# Actions):
#   GCP_HOST     - VM public IP or hostname (e.g. 34.150.99.162)
#   GCP_USER     - SSH username on the VM (e.g. davidcheng380)
#   GCP_SSH_KEY  - a private SSH key whose public key is in the VM's
#                  ~/.ssh/authorized_keys (use a dedicated deploy key)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  backend-build:
    name: Backend build + migration check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Runs surefire tests too (no -DskipTests) per architecture.md.
      - name: Build and test
        working-directory: backend
        run: mvn -B clean package

      # The pom.xml <resources> bug shipped a jar with no migrations and booted
      # prod with an empty schema. Fail the build loudly if that ever recurs.
      - name: Assert Flyway migrations are packaged in the jar
        working-directory: backend
        run: |
          set -euo pipefail
          jar="$(ls target/quarkus-app/app/*.jar | head -1)"
          echo "Inspecting $jar"
          listing="$(jar tf "$jar")"
          echo "$listing" | grep -qE 'db/migration/V[0-9].*\.sql' \
            || { echo "::error::No Flyway migration scripts packaged in $jar"; exit 1; }
          echo "$listing" | grep -qE '(^|/)application\.properties$' \
            || { echo "::error::application.properties not packaged in $jar"; exit 1; }
          echo "OK: Flyway migrations and application.properties are in the jar"

  frontend-build:
    name: Frontend build (type-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: p-frontend/pnpm-lock.yaml

      - name: Install
        working-directory: p-frontend
        run: pnpm install --no-frozen-lockfile

      - name: Type-check and build
        working-directory: p-frontend
        env:
          VITE_BACKEND_URL: http://localhost:8080
        run: pnpm build

  # Hard gate: the codebase is at 0 lint errors. A new error (e.g. a stray
  # `any`) fails this job and blocks the deploy. Pre-existing warnings
  # (react-hooks / react-refresh) are warnings only and do not fail lint.
  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: p-frontend/pnpm-lock.yaml

      - name: Install
        working-directory: p-frontend
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        working-directory: p-frontend
        run: pnpm lint

  deploy:
    name: Deploy to GCP
    # Gate on backend build, frontend build, and frontend lint so a broken jar,
    # a frontend that won't compile, or a new lint error never reaches the VM.
    needs: [backend-build, frontend-build, frontend-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Redeploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd ~/game
            # Make the working tree an exact mirror of origin/main. .env is
            # gitignored, so local production config is preserved.
            git fetch --all --prune
            git reset --hard origin/main
            # Rebuild any service whose build context changed, then restart.
            docker compose -f docker-compose.prod.yml up -d --build
            # Reclaim disk from dangling images left by rebuilds.
            docker image prune -f
            docker compose -f docker-compose.prod.yml ps
