services:
  db:
    image: postgres:15-alpine
    container_name: poker_db_dev
    environment:
      POSTGRES_USER: poker_user
      POSTGRES_PASSWORD: devpassword123
      POSTGRES_DB: poker_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poker_user -d poker_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - dev_network

  redis:
    image: redis:7-alpine
    container_name: poker_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redisdata_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - dev_network

  backend:
    image: maven:3.9.6-eclipse-temurin-21
    container_name: poker_backend_dev
    working_dir: /app
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2
    command: >
      sh -c "mvn compile quarkus:dev
      -Dquarkus.http.host=0.0.0.0
      -Ddebug=5005
      -Dquarkus.analytics.disabled=true"
    ports:
      - "8080:8080"
      - "5005:5005"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/poker_db
      QUARKUS_DATASOURCE_USERNAME: poker_user
      QUARKUS_DATASOURCE_PASSWORD: devpassword123
      QUARKUS_REDIS_HOSTS: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dev_network

  frontend:
    image: node:22-alpine
    container_name: poker_frontend_dev
    working_dir: /app
    volumes:
      - ./p-frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "corepack enable &&
      pnpm install --no-frozen-lockfile &&
      pnpm dev --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: http://localhost:8080
    depends_on:
      - backend
    networks:
      - dev_network

networks:
  dev_network:
    driver: bridge

volumes:
  pgdata_dev:
  redisdata_dev:
  maven_cache:
  frontend_node_modules:
